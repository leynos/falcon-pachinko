name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 }}
      UV_PYTHON: '3.13'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Full history so `cs-coverage check` can reach the pull
          # request's merge base.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Check spelling
        run: make spelling

      - name: Install CLI tools
        run: |
          for tool in mbake ty ruff; do uv tool install ${tool}; done
          npm install -g markdownlint-cli2

      - name: Validate Makefile
        run: mbake validate Makefile

      - name: Install code
        run: make build

      - name: Check formatting
        run: make check-fmt

      - name: Run ruff
        run: make lint

      - name: Run typechecker
        run: make typecheck

      # Coverage runs on pull requests only. Pushes to main upload their
      # own coverage (and advance the ratchet baseline) via
      # coverage-main.yml, so generating it here as well would duplicate
      # the work and the CodeScene upload for the same commit.
      - name: Generate coverage
        if: github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/generate-coverage@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
        with:
          output-path: coverage.xml
          format: cobertura
          # The suite previously ran under slipcover with pytest-forked and
          # no xdist; keep it serial to stay behaviour-preserving. Follow-up
          # 4 removes this pin to adopt pytest-xdist once the suite is
          # confirmed xdist-clean. Note: serial mode is in-process, so the
          # fork isolation the old `--forked` run provided is dropped.
          pytest-workers: ''
          with-ratchet: 'true'

      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          format: cobertura
          mode: check
          project-url: https://api.codescene.io/v2/projects/68790
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
